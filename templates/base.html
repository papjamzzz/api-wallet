<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}API Wallet{% endblock %}</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --bg-card: #1a1a1a;
      --bg-card-hover: #1f1f1f;
      --border: #2a2a2a;
      --border-focus: #7c3aed;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --accent-dim: rgba(124, 58, 237, 0.15);
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #16a34a;
      --radius: 8px;
      --radius-sm: 4px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-hover);
    }

    input, select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      padding: 8px 10px;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--border-focus);
    }

    input[type="password"], input[type="text"].key-value {
      font-family: 'Courier New', monospace;
      letter-spacing: 0.05em;
    }

    button, .btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      padding: 7px 14px;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    button:hover, .btn:hover {
      background: var(--bg-card-hover);
      border-color: #3a3a3a;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-danger {
      background: transparent;
      border-color: var(--border);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: rgba(220, 38, 38, 0.1);
      border-color: var(--danger);
    }

    .btn-ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text-muted);
    }

    .btn-ghost:hover {
      background: var(--bg-card);
      border-color: var(--border);
      color: var(--text);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .error-msg {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: var(--radius-sm);
      color: #f87171;
      font-size: 13px;
      margin-top: 12px;
      padding: 10px 14px;
    }

    .monospace {
      font-family: 'Courier New', Courier, monospace;
    }
  </style>
</head>
<body>
  {% block body %}{% endblock %}

  <script>
    function copyToClipboard(value, btn) {
      navigator.clipboard.writeText(value).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        btn.style.color = '#4ade80';
        setTimeout(() => {
          btn.textContent = orig;
          btn.style.color = '';
        }, 1500);
      }).catch(() => {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = value;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        btn.style.color = '#4ade80';
        setTimeout(() => {
          btn.textContent = orig;
          btn.style.color = '';
        }, 1500);
      });
    }

    function toggleShow(inputId, btn) {
      const input = document.getElementById(inputId);
      if (!input) return;
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    }

    function copyEnvExport(project, btn) {
      fetch('/export/' + encodeURIComponent(project))
        .then(r => r.text())
        .then(text => {
          copyToClipboard(text, btn);
        });
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
